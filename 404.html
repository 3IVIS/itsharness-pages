<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not found — Its Harness</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: oklch(0.972 0.008 270); color: oklch(0.19 0.024 270); height: 100%; }
  body {
    font-family: "IBM Plex Sans", sans-serif;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    padding: 40px;
  }
  .wrap { max-width: 540px; text-align: center; }
  .code {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px;
    color: oklch(0.36 0.16 270);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    font-family: "IBM Plex Sans", sans-serif;
    font-weight: 300;
    font-size: 44px;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin: 0 0 18px;
  }
  h1 em {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    color: oklch(0.36 0.16 270);
  }
  p { color: oklch(0.37 0.020 270); font-size: 16px; line-height: 1.55; margin: 0 0 28px; }
  a {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 6px;
    background: oklch(0.46 0.16 268); color: oklch(0.985 0.008 270);
    text-decoration: none;
    font-family: "IBM Plex Mono", monospace;
    font-size: 13px; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404 · sheet not found</div>
    <h1>That node doesn't exist <em>on this canvas</em>.</h1>
